<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PIERRES CHINOISES - Jeu complet (IA Minimax)</title>
<style>
body { font-family: Arial; text-align: center; background:#222; color:white; }
canvas { background:#d8b46a; margin-top:20px; border:3px solid #000; cursor:pointer; }
button { margin-top:15px; padding:10px 20px; font-size:16px; }
</style>
</head>
<body>
<h1>Jeu PIERRES CHINOISES</h1>
<p id="status">Tour du joueur</p>
<canvas id="board" width="400" height="400"></canvas><br>
<button onclick="init()">Recommencer</button>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

const size = 4;
const cell = canvas.width / size;

let board;
let player;
let selected = null;
let gameOver = false;

function init() {
  board = [
    [1,0,0,2],
    [0,1,2,0],
    [0,2,1,0],
    [2,0,0,1]
  ];
  player = 1;
  selected = null;
  gameOver = false;
  statusText.innerText = "Tour du joueur";
  draw();
}

function cloneBoard(b){ return b.map(r=>r.slice()); }

function draw() {
  ctx.clearRect(0,0,400,400);

  for (let y=0;y<size;y++){
    for (let x=0;x<size;x++){
      ctx.strokeRect(x*cell,y*cell,cell,cell);

      if (board[y][x] !== 0) {
        ctx.beginPath();
        ctx.arc(x*cell+cell/2,y*cell+cell/2,20,0,Math.PI*2);
        ctx.fillStyle = board[y][x]===1?"black":"white";
        ctx.fill();
        ctx.stroke();
      }

      if (selected && selected.x===x && selected.y===y) {
        ctx.strokeStyle="red";
        ctx.lineWidth=3;
        ctx.strokeRect(x*cell+2,y*cell+2,cell-4,cell-4);
        ctx.lineWidth=1;
      }
    }
  }
}

// Génère UNIQUEMENT les coups valides (glissement jusqu'au bord/obstacle)
function getMoves(b, p) {
  let moves = [];

  for (let y=0;y<size;y++){
    for (let x=0;x<size;x++){
      if (b[y][x]===p){
        for (let dy=-1;dy<=1;dy++){
          for (let dx=-1;dx<=1;dx++){
            if (dx===0 && dy===0) continue;

            let cx = x + dx;
            let cy = y + dy;

            // avancer jusqu'à obstacle ou bord
            while(cx>=0 && cx<size && cy>=0 && cy<size && b[cy][cx]===0){
              cx += dx;
              cy += dy;
            }

            // dernière case libre avant obstacle/bord
            cx -= dx;
            cy -= dy;

            if (cx===x && cy===y) continue; // aucun déplacement possible

            moves.push({from:{x,y}, to:{x:cx,y:cy}});
          }
        }
      }
    }
  }

  return moves;
}

function applyMove(b, move, p) {
  let nb = cloneBoard(b);
  nb[move.to.y][move.to.x] = p;
  nb[move.from.y][move.from.x] = 0;
  return nb;
}

function checkWin(b, p) {
  for (let y=0;y<size;y++)
    if (b[y].every(v=>v===p)) return true;

  for (let x=0;x<size;x++){
    let win=true;
    for (let y=0;y<size;y++)
      if (b[y][x]!==p) win=false;
    if (win) return true;
  }

  for (let y=0;y<size-1;y++)
    for (let x=0;x<size-1;x++)
      if (b[y][x]===p && b[y][x+1]===p && b[y+1][x]===p && b[y+1][x+1]===p)
        return true;

  return false;
}

// Heuristique simple
function evaluate(b) {
  if (checkWin(b,2)) return 100;
  if (checkWin(b,1)) return -100;

  let score = 0;

  // bonus alignements IA
  for (let y=0;y<size;y++){
    let count = b[y].filter(v=>v===2).length;
    score += count;
  }

  for (let x=0;x<size;x++){
    let count=0;
    for (let y=0;y<size;y++) if (b[y][x]===2) count++;
    score += count;
  }

  return score;
}

function minimax(b, depth, maximizing) {
  if (depth===0 || checkWin(b,1) || checkWin(b,2)) {
    return evaluate(b);
  }

  if (maximizing) {
    let maxEval = -Infinity;
    let moves = getMoves(b,2);

    for (let m of moves) {
      let eval = minimax(applyMove(b,m,2), depth-1, false);
      maxEval = Math.max(maxEval, eval);
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    let moves = getMoves(b,1);

    for (let m of moves) {
      let eval = minimax(applyMove(b,m,1), depth-1, true);
      minEval = Math.min(minEval, eval);
    }
    return minEval;
  }
}

function aiMove() {
  let moves = getMoves(board,2);
  if (moves.length===0) return;

  let bestScore = -Infinity;
  let bestMove = moves[0];

  for (let m of moves) {
    let score = minimax(applyMove(board,m,2), 3, false);
    if (score > bestScore) {
      bestScore = score;
      bestMove = m;
    }
  }

  board = applyMove(board,bestMove,2);

  if (checkWin(board,2)) {
    statusText.innerText = "Victoire IA !";
    gameOver=true;
    draw();
    return;
  }

  player=1;
  statusText.innerText = "Tour du joueur";
  draw();
}

canvas.addEventListener("click", (e)=>{
  if (gameOver || player!==1) return;

  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX-rect.left)/cell);
  const y = Math.floor((e.clientY-rect.top)/cell);

  if (selected) {
    let moves = getMoves(board,1);
    let valid = moves.find(m => m.from.x===selected.x && m.from.y===selected.y && m.to.x===x && m.to.y===y);

    if (valid) {
      board = applyMove(board, valid, 1);
      selected=null;

      if (checkWin(board,1)) {
        statusText.innerText = "Victoire joueur !";
        gameOver=true;
        draw();
        return;
      }

      player=2;
      statusText.innerText = "Tour IA";
      draw();
      setTimeout(aiMove,300);
    } else {
      selected=null;
      draw();
    }
  } else if (board[y][x]===1) {
    selected={x,y};
    draw();
  }
});

init();
</script>
</body>
</html>
